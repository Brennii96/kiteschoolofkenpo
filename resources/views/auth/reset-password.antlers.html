{{ partial src="partials/flex_section" lighten="true" }}

<div class="w-full max-w-md">
    <div class="panel relative overflow-hidden border-l-4 border-red-brand">

        <div class="absolute top-0 right-0 w-0 h-0 border-t-40 border-r-40 border-t-transparent border-r-red-brand opacity-30"></div>

        <div class="px-8 pt-8 pb-6 border-b border-white/5 relative">
            <div class="absolute bottom-0 left-8 w-12 h-0.5 bg-red-brand"></div>
            <p class="font-montserrat text-[0.65rem] font-bold tracking-[0.2em] uppercase text-brand-400 mb-2">Members Portal</p>
            <h1 class="font-montserrat text-3xl font-black text-white leading-tight tracking-tight">
                New<br><span class="text-red-brand">Password.</span>
            </h1>
        </div>

        <div class="px-8 pt-7 pb-8">
            <form method="POST" action="/reset-password">
                {{ csrf_field }}
                <input type="hidden" name="token" value="{{ token }}">

                <div class="mb-7 group">
                    <label for="email" class="block font-montserrat text-2xs font-bold tracking-[0.15em] uppercase text-off-white group-focus-within:text-brand-300 transition-colors duration-200 mb-2">
                        Email Address
                    </label>
                    <input
                        id="email"
                        type="email"
                        name="email"
                        value="{{ email ?? old:email }}"
                        required
                        autofocus
                        autocomplete="email"
                        class="w-full bg-transparent border-0 border-b border-white/15 focus:border-red-brand pb-2 text-white font-roboto font-light text-base outline-none transition-colors duration-200"
                    >
                    {{ get_error:email }}
                    <p class="text-brand-300 text-xs mt-1 font-roboto">{{ message }}</p>
                    {{ /get_error:email }}
                </div>

                <div class="mb-7 group">
                    <label for="password" class="block font-montserrat text-2xs font-bold tracking-[0.15em] uppercase text-off-white group-focus-within:text-brand-300 transition-colors duration-200 mb-2">
                        New Password
                    </label>
                    <input
                        id="password"
                        type="password"
                        name="password"
                        required
                        autocomplete="new-password"
                        class="w-full bg-transparent border-0 border-b border-white/15 focus:border-red-brand pb-2 text-white font-roboto font-light text-base outline-none transition-colors duration-200"
                    >
                    {{ get_error:password }}
                    <p class="text-brand-300 text-xs mt-1 font-roboto">{{ message }}</p>
                    {{ /get_error:password }}
                </div>

                <div class="mb-8 group">
                    <label for="password_confirmation" class="block font-montserrat text-2xs font-bold tracking-[0.15em] uppercase text-off-white group-focus-within:text-brand-300 transition-colors duration-200 mb-2">
                        Confirm Password
                    </label>
                    <input
                        id="password_confirmation"
                        type="password"
                        name="password_confirmation"
                        required
                        autocomplete="new-password"
                        class="w-full bg-transparent border-0 border-b border-white/15 focus:border-red-brand pb-2 text-white font-roboto font-light text-base outline-none transition-colors duration-200"
                    >
                </div>

                <button
                    type="submit"
                    class="btn w-full"
                >
                    Reset Password
                </button>
            </form>
        </div>

    </div>
</div>

{{ /partial }}
