{{ partial src="partials/flex_section" lighten="true" }}

<div class="w-full max-w-md">
    <div class="bg-dark-brand rounded-sm overflow-hidden shadow-2xl border-l-4 border-red-brand relative">

        <div class="absolute top-0 right-0 w-0 h-0 border-t-40 border-r-40 border-t-transparent border-r-red-brand opacity-30"></div>

        <div class="px-8 pt-8 pb-6 border-b border-white/5 relative">
            <div class="absolute bottom-0 left-8 w-12 h-0.5 bg-red-brand"></div>
            <p class="font-montserrat text-[0.65rem] font-bold tracking-[0.2em] uppercase text-brand-400 mb-2">Members Portal</p>
            <h1 class="font-montserrat text-3xl font-black text-white leading-tight tracking-tight">
                Welcome<br><span class="text-red-brand">Back.</span>
            </h1>
        </div>

        <div class="px-8 pt-7 pb-8">
            <form method="POST" action="/login">
                {{ csrf_field }}

                <div class="mb-7 group">
                    <label for="email" class="block font-montserrat text-2xs font-bold tracking-[0.15em] uppercase text-off-white group-focus-within:text-brand-300 transition-colors duration-200 mb-2">
                        Email Address
                    </label>
                    <input
                        id="email"
                        type="email"
                        name="email"
                        value="{{ old:email }}"
                        required
                        autofocus
                        autocomplete="email"
                        class="w-full bg-transparent border-0 border-b border-white/15 focus:border-red-brand pb-2 text-white font-roboto font-light text-base outline-none transition-colors duration-200"
                    >
                    {{ get_error:email }}
                    <p class="text-brand-300 text-xs mt-1 font-roboto">{{ message }}</p>
                    {{ /get_error:email }}
                </div>

                <div class="mb-7 group">
                    <label for="password" class="block font-montserrat text-2xs font-bold tracking-[0.15em] uppercase text-off-white group-focus-within:text-brand-300 transition-colors duration-200 mb-2">
                        Password
                    </label>
                    <input
                        id="password"
                        type="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        class="w-full bg-transparent border-0 border-b border-white/15 focus:border-red-brand pb-2 text-white font-roboto font-light text-base outline-none transition-colors duration-200"
                    >
                    {{ get_error:password }}
                    <p class="text-brand-300 text-xs mt-1 font-roboto">{{ message }}</p>
                    {{ /get_error:password }}
                </div>

                <div class="flex items-center gap-3 mb-8">
                    <input
                        id="remember_me"
                        type="checkbox"
                        name="remember"
                        class="w-4 h-4 accent-red-brand cursor-pointer"
                    >
                    <label for="remember_me" class="text-sm text-off-white font-roboto font-light cursor-pointer select-none">
                        Keep me signed in
                    </label>
                </div>

                <button
                    type="submit"
                    class="w-full bg-red-brand hover:bg-red-brand-dark active:scale-[0.99] text-white font-montserrat font-bold text-[0.8rem] tracking-[0.15em] uppercase py-3.5 px-6 rounded-sm transition-all duration-200"
                >
                    Sign In
                </button>
            </form>
        </div>

        <div class="px-8 py-4 border-t border-white/5 flex justify-end">
            <a href="/register" class="text-xs text-off-white font-roboto hover:text-brand-300 transition-colors duration-200">
                Don't have an account? &nbsp;Register
            </a>
        </div>

    </div>
</div>

{{ /partial }}
