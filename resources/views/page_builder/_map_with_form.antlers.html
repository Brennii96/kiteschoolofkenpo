{{ partial src='partials/flex_section' id="mapSection" lighten="true" }}
<p class="intro_label">{{ intro_label }}</p>
<h2 class="section-heading">
    {{ title }}
</h2>
{{ partial src="partials/seperator" }}

<div class="grid w-full max-w-6xl grid-cols-1 items-start gap-8 md:grid-cols-2 lg:grid-cols-5">
    <div class="h-[clamp(32rem,70vh,44rem)] w-full self-start overflow-hidden lg:col-span-3">
        {{ partial:map latitude="{{latitude}}" longitude="{{longitude}}" }}
    </div>
    <div id="bookAClass" class="panel scroll-mt-28 p-6 lg:col-span-2">
        {{ partial:book_a_class_form }}
    </div>
</div>
{{ /partial }}
