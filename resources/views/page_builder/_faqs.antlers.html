{{ partial src="partials/flex_section" id="faq" lighten="{{lighten}}" }}
<p class="intro_label">{{ intro_label }}</p>
<h3 class="section-heading">
    {{ title }}
</h3>
{{ partial src="partials/seperator" }}
    {{ collection:faqs limit="{limit}" }}
        <div class="faq-item mx-auto mb-3 w-full max-w-3xl">
            <div class="w-full border border-white/10 bg-cream-brand p-2 shadow-xl shadow-black/20">
                <div>
                    <button
                        class="toggle-accordion flex w-full justify-between gap-4 px-4 py-3 text-left text-base font-bold text-ink-brand hover:bg-red-brand/10 focus:outline-none focus-visible:ring focus-visible:ring-red-brand-dark focus-visible:ring-opacity-75">
                        <span>{{question}}</span>
                        <span class="faq-icon shrink-0 text-red-brand transition-transform duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                                 class="w-5 h-5">
                                <path
                                    d="M8.75 3.75a.75.75 0 0 0-1.5 0v3.5h-3.5a.75.75 0 0 0 0 1.5h3.5v3.5a.75.75 0 0 0 1.5 0v-3.5h3.5a.75.75 0 0 0 0-1.5h-3.5v-3.5Z"/>
                            </svg>
                        </span>
                    </button>

                    <div class="faq-content max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                        <div class="prose min-w-full px-4 pb-4 pt-3 text-base text-gray-800">
                            <div class="prose max-w-none prose:text-gray-800">
                                {{ answer | markdown }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    {{ /collection:faqs }}
{{ /partial }}
