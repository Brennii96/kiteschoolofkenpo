{{ partial src="partials/flex_section" lighten="{{ lighten }}" }}
    <div class="relative container mx-auto flex max-w-5xl flex-col content-center items-center text-center">
        <p class="intro_label">{{ intro_label }}</p>
        <h2 class="section-heading">
            {{title}}
        </h2>
        <div class="mt-7 max-w-3xl text-center text-lg leading-relaxed text-off-white">
            {{ content }}
        </div>
        {{ if cta_link }}
            <div class="mt-9 flex justify-center items-center">
                <a href="{{ cta_link }}" class="btn-secondary">
                    {{ cta_text ?? "Read more" }}
                </a>
            </div>
        {{ /if }}
    </div>
{{ /partial }}
