<div class="panel p-6">
    <h3 class="mb-2 font-montserrat text-2xl font-black uppercase text-white">{{ title }}</h3>
    <p class="mb-4 text-sm text-off-white">{{ description }}</p>

    <div class="mb-6">
        <span class="text-4xl font-montserrat text-white">{{ price }}</span>
        <span class="text-sm text-gold-brand">/ {{ term }}</span>
    </div>

    <button class="btn w-full">
        Select Plan
    </button>
</div>
