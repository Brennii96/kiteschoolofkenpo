<div class="relative w-full overflow-hidden border border-white/10 bg-black" style="padding-top: 56.25%;">
    <iframe
        src="{{ video_url }}"
        title="{{ title }}"
        width="100%"
        height="100%"
        frameborder="0"
        scrolling="no"
        loading="lazy"
        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        style="border: 0; position: absolute; top: 0; left: 0; height: 100%; width: 100%; max-width: 100%;"
    ></iframe>
</div>
