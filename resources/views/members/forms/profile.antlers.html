<form method="POST" action="{{ route:profile.update }}" class="space-y-7">
    {{ csrf_field }}
    <input type="hidden" name="_method" value="PATCH"/>

    <div class="group">
        <label class="block font-montserrat text-2xs font-bold tracking-[0.15em] uppercase text-off-white group-focus-within:text-brand-300 transition-colors duration-200 mb-2">
            Name
        </label>
        <input
            type="text"
            name="name"
            value="{{ member:name }}"
            class="w-full bg-transparent border-0 border-b border-white/15 focus:border-red-brand pb-2 text-white font-roboto font-light text-base outline-none transition-colors duration-200"/>
        {{ get_error:name }}
            <p class="text-brand-300 text-xs mt-1 font-roboto">{{ message }}</p>
        {{ /get_error:name }}
    </div>

    <div class="group">
        <label class="block font-montserrat text-2xs font-bold tracking-[0.15em] uppercase text-off-white group-focus-within:text-brand-300 transition-colors duration-200 mb-2">
            Email Address
        </label>
        <input
            type="email"
            name="email"
            value="{{ member:email }}"
            class="w-full bg-transparent border-0 border-b border-white/15 focus:border-red-brand pb-2 text-white font-roboto font-light text-base outline-none transition-colors duration-200"/>
        {{ get_error:email }}
            <p class="text-brand-300 text-xs mt-1 font-roboto">{{ message }}</p>
        {{ /get_error:email }}
    </div>

    <div class="flex justify-end pt-2">
        <button
            type="submit"
            class="bg-red-brand hover:bg-red-brand-dark active:scale-[0.99] text-white font-montserrat font-bold text-[0.8rem] tracking-[0.15em] uppercase py-3.5 px-6 rounded-sm transition-all duration-200">
            Save Changes
        </button>
    </div>
</form>
