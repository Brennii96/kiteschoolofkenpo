{{ partial:flex_section }}
    <section class="body-font w-full overflow-hidden text-gray-600">
        <div class="container mx-auto">
            <div class="mb-10 text-center">
                <p class="intro_label justify-center">Browse</p>
                <h1 class="section-heading mx-auto">Article Tags</h1>
            </div>

            <div class="grid w-full grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
                {{ tags }}
                    <a href="{{ url }}" class="panel block p-5 font-montserrat text-sm font-bold uppercase tracking-[0.14em] text-white transition-colors hover:text-gold-brand">
                        {{ title }}
                    </a>
                {{ /tags }}
            </div>
        </div>
    </section>
{{ /partial:flex_section }}
