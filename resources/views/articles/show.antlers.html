{{ if {hero_enabled} }}
    {{ partial:partials/article_hero }}
{{ /if }}

<article class="flex bg-light-dark-brand bg-cover bg-center bg-no-repeat">
    <div class="container mx-auto flex flex-col content-center items-center px-4 py-16 lg:py-24">
        <div class="w-full max-w-3xl lg:flex justify-center items-center flex-col md:mb-5 mb-10">
            <div class="mb-4">
                <h1 class="font-montserrat text-4xl font-black uppercase text-white">{{title}}</h1>
                {{ tags }}
                <a class="text-gold-brand" href="{{ url }}">{{ title }}</a>
                {{ /tags }}
                {{ if featured_image }}
                    <div class="my-4 mx-0">
                        <img
                            class="mx-auto border border-white/10"
                            src="{{ glide :src="featured_image" height="200" width="200" }}"
                            alt="{{ featured_image:alt ?? title }}"
                        />
                    </div>
                {{ /if }}
                <div class="max-w-2xl mx-auto">
                </div>
            </div>
            <div
                class="prose prose-invert max-w-none prose-headings:font-heading prose-headings:font-black prose-headings:uppercase prose-headings:tracking-normal prose-h1:text-4xl prose-h2:text-4xl prose-h3:text-3xl prose-h4:text-3xl prose-strong:text-white">
                {{ article_content }}
            </div>
            <div class="mt-8 flex">
                <a href="/get-motivated" class="btn-secondary">
                    Back
                </a>
            </div>
        </div>
    </div>
</article>
