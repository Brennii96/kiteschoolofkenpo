{{ if {hero_enabled} }}
    {{ partial:partials/article_hero }}
{{ /if }}

<article class="flex bg-light-dark-brand bg-cover bg-center bg-no-repeat">
    <div class="container mx-auto flex flex-col content-center items-center px-4 py-16 lg:py-24">
        <div class="w-full max-w-6xl lg:flex justify-center items-center flex-col md:mb-5 mb-10">
            <div class="mb-8 text-center">
                <p class="section-kicker justify-center">Syllabus</p>
                <h1 class="section-heading mx-auto">{{title}}</h1>
                {{ tags }}
                    <a class="mt-3 inline-block text-gold-brand" href="{{ url }}">{{ title }}</a>
                {{ /tags }}
                {{ if featured_image }}
                    <div class="my-4 mx-0">
                        <picture>
                            <source srcset="{{ glide :src="featured_image" width="200" height="200" format="avif" }}" type="image/avif">
                            <source srcset="{{ glide :src="featured_image" width="200" height="200" format="webp" }}" type="image/webp">
                            <img
                                class="mx-auto border border-white/10"
                                src="{{ glide :src="featured_image" width="200" height="200" }}"
                                alt="{{ featured_image:alt }}"
                                loading="lazy"
                                width="200"
                                height="200"
                            />
                        </picture>
                    </div>
                {{ /if }}
            </div>
            <div
                class="prose prose-invert max-w-3xl prose-headings:font-heading prose-headings:font-black prose-headings:uppercase prose-headings:tracking-normal prose-h1:text-4xl prose-h2:text-4xl prose-h3:text-3xl prose-h4:text-3xl prose-strong:text-white">
                {{ article_content }}
            </div>

            {{ cache }}
                {{ partial:partials/syllabus }}
            {{ /cache }}

{{#             <div class="mt-8 flex"> #}}
{{#                 <a href="{{ url }}" class="btn-secondary"> #}}
{{#                     Back #}}
{{#                 </a> #}}
{{#             </div> #}}
        </div>
    </div>
</article>
