<article class="profile-card bg-light-dark-brand bg-cover bg-center bg-no-repeat" aria-label="Profile: {{ title }}">
    <div class="container mx-auto flex flex-col items-center px-4 py-16 lg:py-24">
        <div class="w-full max-w-3xl lg:flex justify-center items-center flex-col md:mb-5 mb-10">
            <div class="mb-4 text-center">
                <p class="intro_label justify-center">{{ intro_label }}</p>
                <h1 class="font-montserrat text-4xl font-black uppercase text-white">{{ title }}</h1>

                {{ if profile_image }}
                    <div class="my-4">
                        <picture>
                            <source srcset="{{ glide :src="profile_image" height="200" width="200" format="avif" }}" type="image/avif">
                            <source srcset="{{ glide :src="profile_image" height="200" width="200" format="webp" }}" type="image/webp">
                            <img
                                class="mx-auto border border-white/10"
                                src="{{ glide :src="profile_image" height="200" width="200" format="jpg" }}"
                                alt="{{ profile_image:alt ?? title }}"
                                loading="lazy"
                            />
                        </picture>
                    </div>
                {{ else }}
                    <div class="my-4">
                        <div class="mx-auto h-52 w-52 bg-gray-400"></div>
                    </div>
                {{ /if }}
            </div>
            <div class="prose prose-invert max-w-none prose-headings:font-heading prose-headings:font-black prose-headings:uppercase prose-headings:tracking-normal prose-strong:text-white">
                {{ bio }}
            </div>
            <div class="mt-8">
                <a href="/about-kenpo-karate" class="btn-secondary" aria-label="Back to previous page">
                    Back
                </a>
            </div>
        </div>
    </div>
</article>
