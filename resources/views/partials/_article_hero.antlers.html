<section
    class="hero-section relative flex min-h-[620px] w-full items-center justify-center overflow-hidden bg-ink-brand sm:min-h-[680px] lg:min-h-[760px]">
    <div class="absolute inset-0 w-full h-full">
        <picture>
            <source srcset="
                {{ glide :src='background_image' format='avif' width='480' height='300' }} 480w,
                {{ glide :src='background_image' format='avif' width='768' height='480' }} 768w,
                {{ glide :src='background_image' format='avif' width='1024' height='600' }} 1024w,
                {{ glide :src='background_image' format='avif' width='1920' height='1200' }} 1920w"
                    type="image/avif">

            <source srcset="
                {{ glide :src='background_image' format='webp' width='480' height='300' }} 480w,
                {{ glide :src='background_image' format='webp' width='768' height='480' }} 768w,
                {{ glide :src='background_image' format='webp' width='1024' height='600' }} 1024w,
                {{ glide :src='background_image' format='webp' width='1920' height='1200' }} 1920w"
                    type="image/webp">

            <img src="{{ glide :src='background_image' format='jpg' width='1920' height='1200' }}"
                 class="w-full h-full object-cover object-center absolute inset-0"
                 alt="">
        </picture>
    </div>
    <div class="absolute inset-0 bg-linear-to-b from-ink-brand/45 via-ink-brand/60 to-dark-brand"></div>
    <div class="absolute bottom-0 left-0 right-0 h-px bg-linear-to-r from-transparent via-red-brand to-transparent"></div>

    <div
        class="relative z-10 container mx-auto flex max-w-7xl flex-col items-center px-4 py-20 text-center sm:px-6 lg:px-8">
        <p class="intro_label mb-5">{{ intro_label }}</p>
        <div class="flex w-full flex-col items-center">
            <h1 class="hero-title">
                {{ hero_title }}
            </h1>
            <div class="hero-text">
                {{ hero_content }}
            </div>
        </div>
        <div class="mt-9 flex flex-wrap items-center justify-center gap-4">
            {{ if cta_link }}
                <a href="{{ cta_link }}" class="btn">
                    {{ cta_text ?? "Learn More" }}
                </a>
            {{ /if }}
        </div>
    </div>
</section>
