<div x-data="{ isOpen: true }"
     class="relative flex h-full w-full items-end justify-start overflow-hidden bg-ink-brand"
     data-google-map-container
>
    <div id="{{ map_id }}"
         class="h-full w-full bg-steel-brand"
         data-google-map
         data-map-id="{{ map_id }}"
         data-api-key="{{ api:maps_key }}"
         data-lat="{{ latitude }}"
         data-lng="{{ longitude }}"
         data-title="{{ site:name }}"
    >
        <div class="flex h-full w-full items-center justify-center bg-ink-brand">
            <div class="loader"></div>
        </div>
    </div>

    <div x-show="isOpen" x-cloak
         class="absolute bottom-3 left-3 right-3 max-h-[42%] w-auto overflow-y-auto border-l-4 border-red-brand bg-cream-brand p-1 text-ink-brand shadow-2xl shadow-black/35 transition-all duration-300 md:left-5 md:right-auto md:max-h-[50%] md:w-[clamp(22rem,36vw,28rem)]">
        <button type="button" x-on:click="isOpen = false"
                class="absolute right-3 top-3 text-steel-brand transition-colors hover:text-red-brand focus:outline-none"
                aria-label="Close Contact Information">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>

        <div class="p-3 md:p-4">
            <div class="hidden justify-between gap-4 md:flex">
                <div class="pr-4">
                    <h3 class="title-font text-xs font-bold uppercase tracking-[0.18em] text-red-brand">Address</h3>
                    <div class="mt-1">
                        <p>
                            <a class="font-medium text-ink-brand underline decoration-red-brand underline-offset-4 hover:text-red-brand" href="{{ contact:what_3_words_link }}" target="_blank"
                               rel="noreferrer noopener">
                                {{ contact:what_3_words }}
                            </a>
                        </p>
                    </div>
                    <p class="mt-1">
                        <a class="font-medium text-ink-brand underline decoration-red-brand underline-offset-4 hover:text-red-brand" href="{{ contact:address_link }}" target="_blank" rel="noopener noreferrer">
                            {{ contact:address | nl2br }}
                        </a>
                    </p>
                </div>
                <div class="pr-6">
                    <h3 class="title-font text-xs font-bold uppercase tracking-[0.18em] text-red-brand">Phone</h3>
                    <p class="mt-1">
                        <a class="font-medium text-ink-brand underline decoration-red-brand underline-offset-4 hover:text-red-brand" href="tel:{{ contact:phone }}">{{ contact:phone }}</a>
                    </p>
                </div>
            </div>

            <div class="flex flex-col md:hidden">
                <div>
                    <p class="text-xs font-bold uppercase tracking-[0.18em] text-red-brand">Address</p>
                    <a class="text-sm font-medium text-ink-brand underline decoration-red-brand underline-offset-4 hover:text-red-brand" href="{{ contact:what_3_words_link }}" target="_blank"
                       rel="noreferrer noopener">
                        {{ contact:what_3_words }}
                    </a>
                    <a class="block text-sm font-medium text-ink-brand underline decoration-red-brand underline-offset-4 hover:text-red-brand" href="{{ contact:address_link }}" target="_blank"
                       rel="noopener noreferrer">
                        {{ contact:address | nl2br }}
                    </a>
                </div>
                <div class="mt-3">
                    <p class="text-xs font-bold uppercase tracking-[0.18em] text-red-brand">Phone</p>
                    <a class="text-sm font-medium text-ink-brand underline decoration-red-brand underline-offset-4 hover:text-red-brand" href="tel:{{ contact:phone }}">
                        {{ contact:phone }}
                    </a>
                </div>
            </div>
        </div>
    </div>

    <button x-show="!isOpen" x-cloak x-on:click="isOpen = true"
            class="btn absolute bottom-3 left-3 p-2 text-2xs md:left-5"
            aria-label="Show Contact Information">
        Show Contact Info
    </button>
</div>
