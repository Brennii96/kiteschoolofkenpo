<div class="panel relative flex h-full flex-col divide-y divide-white/10 overflow-hidden {{ if featured }}ring-2 ring-gold-brand{{ /if }}">
    {{ if featured }}
        <div class="absolute right-4 top-4">
            <span class="bg-gold-brand px-3 py-1 font-montserrat text-2xs font-bold uppercase tracking-[0.16em] text-ink-brand">Most Popular</span>
        </div>
    {{ /if }}

    <div class="flex h-full flex-col p-6">
        <h2 class="pr-24 font-montserrat text-2xl font-black uppercase leading-tight text-white">
            {{ title }}
        </h2>
        <p class="mt-4 text-sm text-off-white">
            {{ description }}
        </p>
        <p class="mt-8">
            <span class="font-montserrat text-5xl font-black text-white">{{ price }}</span>
            <span class="text-base font-medium text-gold-brand">/ {{ term }}</span>
        </p>
        <button
            type="button"
            @click="$dispatch('plan:selected', { priceId: '{{ price_id }}', title: '{{ title }}', price: '{{ price }}', term: '{{ term }}' })"
            class="btn mt-auto w-full"
        >Subscribe</button>
    </div>
</div>
